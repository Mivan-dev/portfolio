<div class="border border-slate-700 rounded-xl overflow-hidden bg-slate-800/50 hover:border-teal-600 transition-colors">
  <div class="relative">
    <img [src]="images()[currentImage()]" alt="" class="w-full h-64 object-cover" />

    <button class="absolute top-1/2 -translate-y-1/2 left-2" (click)="prevImage()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-white"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <button class="absolute top-1/2 -translate-y-1/2 right-2" (click)="nextImage()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-white"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-2">
      @for (img of images(); track img; let i = $index) {
        <span
          [class.bg-teal-600]="i === currentImage()"
          class="w-2 h-2 rounded-full bg-slate-500"
          (click)="goToImage(i)"
        ></span>
      }
    </div>
  </div>

  <div class="flex flex-col gap-3 p-5">
    <a href="" class="cursor-pointer">
    <h3 class="text-xl font-semibold text-white ">{{ title() }}</h3>
    <p class="text-base text-slate-300">{{ description() }}</p>

    <div class="flex flex-row flex-wrap gap-3 pt-2">
      @for (tech of technologies(); track tech) {
        <span class="text-sm text-slate-200 border border-slate-600 rounded-full px-4 py-1">{{ tech }}</span>
      }
    </div>
    </a>
  </div>
</div>
