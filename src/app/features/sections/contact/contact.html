<div class="flex flex-row justify-between sectionScreen" id="contacto">
  <div class="text-left w-1/4 flex flex-col items-start justify-center">
    <h2 class="text-4xl uppercase tracking-wide text-slate-400">Contacto</h2>
  </div>
  <div class="text-left w-3/4 flex flex-col justify-center">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="">
      <div class="flex flex-row py-4 gap-3">
        <div class="flex flex-col gap-3">
          <input
            type="text"
            formControlName="nombre"
            placeholder="Nombre Completo"
            class="inputs"
          />
          <input
            type="text"
            formControlName="email"
            placeholder="ejemplo@email.com"
            class="inputs"
          />
          <input type="text" formControlName="telefono" placeholder="3511234567" class="inputs" />
        </div>
        <textarea
          type="text"
          formControlName="mensaje"
          placeholder="Mensaje"
          class="w-full border border-slate-600 rounded-xl px-4 py-2 text-white hover:border-teal-600 cursor-pointer"
        ></textarea>
      </div>
      <button type="submit" class="rounded-md cursor-pointer buttons px-6 py-2">Enviar</button>
    </form>
  </div>
</div>
